<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ghana Connect Admin</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>🇬🇭 Ghana Connect Admin</h1>

<p>Control Panel</p>

</header>


<h2 id="status">
Checking access...
</h2>


<h2>
Users
</h2>

<p id="userCount"></p>

<div id="users"></div>




<h2>
Posts
</h2>

<p id="postCount"></p>

<div id="posts"></div>






<script type="module">


import {db, auth} from "./firebase.js";


import {

collection,

getDocs,

doc,

getDoc,

deleteDoc

} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";


import {

onAuthStateChanged

} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";







onAuthStateChanged(auth,async(user)=>{


if(!user){

document.getElementById("status").innerHTML =
"Please login first";

return;

}



let adminDoc = await getDoc(

doc(db,"users",user.uid)

);



if(
adminDoc.exists() &&
adminDoc.data().role==="admin"
){


document.getElementById("status").innerHTML =
"✅ Admin Access";


loadUsers();

loadPosts();



}else{


document.getElementById("status").innerHTML =
"❌ Access denied";


}



});







async function loadUsers(){


let box =
document.getElementById("users");


let snapshot =

await getDocs(

collection(db,"users")

);



document.getElementById("userCount").innerHTML =

"Total Users: " + snapshot.size;



box.innerHTML="";



snapshot.forEach(doc=>{


let user=doc.data();



box.innerHTML += `


<div class="card">


<h3>${user.name || "User"}</h3>


<p>${user.email || ""}</p>


<p>📍 ${user.region || ""}</p>


<p>Role: ${user.role || "user"}</p>


</div>


`;



});



}









async function loadPosts(){


let box =
document.getElementById("posts");


let snapshot =

await getDocs(

collection(db,"posts")

);



document.getElementById("postCount").innerHTML =

"Total Posts: " + snapshot.size;



box.innerHTML="";



snapshot.forEach(docSnap=>{


let post=docSnap.data();



box.innerHTML += `


<div class="card">


<h3>${post.type}</h3>


<h2>${post.title}</h2>


<p>${post.description}</p>


<p>📍 ${post.location}</p>



<button onclick="deletePost('${docSnap.id}')">

🗑 Delete

</button>


</div>


`;



});


}






window.deletePost = async function(id){


let confirmDelete = confirm(

"Delete this post?"

);



if(confirmDelete){


await deleteDoc(

doc(db,"posts",id)

);


alert("Post deleted");


location.reload();


}



}



</script>



</body>

</html>

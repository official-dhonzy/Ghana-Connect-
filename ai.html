<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ghana Connect AI</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>🤖 Ghana Connect AI</h1>

<p>Your Ghana solutions assistant</p>

</header>




<div class="form">


<input 
id="question"
placeholder="Ask Ghana Connect AI anything..."
>


<button onclick="askAI()">

Ask AI

</button>



<div class="card">

<p id="answer">
AI is ready to help.
</p>


</div>


</div>





<script type="module">


import { askGhanaAI } from "./ai.js";



window.askAI = async function(){


let question =
document.getElementById("question").value;



let answer =
document.getElementById("answer");



answer.innerHTML =
"Thinking... 🤖";



try{


let response =
await askGhanaAI(question);



answer.innerHTML =
response;


}


catch(error){


answer.innerHTML =
"AI connection error. Check Firebase AI settings.";


console.log(error);


}


}



</script>




</body>

</html>

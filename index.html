<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghana Connect</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🇬🇭 Ghana Connect</h1>
<p>Connecting Ghanaians to opportunities and solutions</p>
</header>


<div class="search-box">
<input id="search" placeholder="Search jobs, services, houses...">
<button onclick="search()">🔍</button>
</div>


<h2>Explore</h2>


<div class="container">

<div class="card" onclick="go('jobs')">
💼
<h3>Jobs</h3>
<p>Find work and opportunities</p>
</div>


<div class="card" onclick="go('services')">
🔧
<h3>Services</h3>
<p>Find trusted workers</p>
</div>


<div class="card" onclick="go('housing')">
🏠
<h3>Housing</h3>
<p>Find rooms and houses</p>
</div>


<div class="card" onclick="go('farming')">
🌱
<h3>Farming</h3>
<p>Connect farmers and buyers</p>
</div>


<div class="card" onclick="go('education')">
📚
<h3>Education</h3>
<p>Learn and study</p>
</div>


<div class="card" onclick="go('marketplace')">
🛒
<h3>Marketplace</h3>
<p>Buy and sell</p>
</div>

</div>



<nav>

<button>🏠 Home</button>
<button>➕ Post</button>
<button>💬 Messages</button>
<button>👤 Profile</button>

</nav>


<script src="app.js"></script>

</body>
</html>

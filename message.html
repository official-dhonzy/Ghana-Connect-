<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat - Ghana Connect</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>💬 Ghana Connect Chat</h1>

</header>



<div id="messages"></div>



<div class="form">

<input 
id="message"
placeholder="Type message..."
>


<button onclick="sendMessage()">

Send

</button>


</div>





<script type="module">


import {db, auth} from "./firebase.js";


import {

collection,

addDoc,

query,

where,

orderBy,

onSnapshot

} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";



let conversationId =

new URLSearchParams(window.location.search)
.get("id");



let receiverId =

new URLSearchParams(window.location.search)
.get("receiverId");



let box =

document.getElementById("messages");





function loadMessages(){



let q = query(

collection(db,"messages"),

where("conversationId","==",conversationId),

orderBy("date")

);



onSnapshot(q,(snapshot)=>{


box.innerHTML="";



snapshot.forEach((doc)=>{


let msg = doc.data();



box.innerHTML += `


<div class="card">


<p>

${msg.text}

</p>


<small>

${msg.sender}

</small>


</div>


`;


});


});


}





window.sendMessage = async function(){



let user = auth.currentUser;



if(!user){

alert("Login first");

return;

}




let input =

document.getElementById("message");



let text =

input.value.trim();



if(text===""){

return;

}




await addDoc(

collection(db,"messages"),

{


conversationId:conversationId,

sender:user.uid,

text:text,

date:new Date()


}

);





// Create notification

if(receiverId){


await addDoc(

collection(db,"notifications"),

{


userId:receiverId,

message:"You received a new message 💬",

date:new Date()


}

);


}





input.value="";



}






loadMessages();



</script>


</body>

</html>

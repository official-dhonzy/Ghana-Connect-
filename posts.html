<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Listings - Ghana Connect</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f7fafc;
            color: #2d3748;
        }

        /* Navigation */
        nav {
            background: white;
            padding: 1rem 5%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: #dc2626;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #dc2626;
            color: white;
            box-shadow: 0 2px 8px rgba(220, 38, 38, 0.3);
        }

        .btn-primary:hover {
            background: #991b1b;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #2d3748;
        }

        .btn-secondary:hover {
            background: #cbd5e1;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.9rem;
        }

        /* Main Content */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 5%;
        }

        /* Filters */
        .filters {
            background: white;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .filter-group select {
            padding: 0.6rem;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 0.9rem;
            background: white;
            cursor: pointer;
        }

        .filter-group select:focus {
            outline: none;
            border-color: #dc2626;
        }

        /* Posts Grid */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .post-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .post-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.12);
        }

        .post-image {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #f0f0f0, #e0e0e0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #cbd5e1;
        }

        .post-content {
            padding: 1.25rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .post-category {
            display: inline-block;
            background: #fef08a;
            color: #92400e;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            width: fit-content;
        }

        .post-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #1a202c;
            line-height: 1.4;
        }

        .post-description {
            font-size: 0.9rem;
            color: #718096;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .post-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
            font-size: 0.85rem;
            color: #718096;
        }

        .post-price {
            font-size: 1.2rem;
            font-weight: 700;
            color: #dc2626;
        }

        .post-region {
            background: #f7fafc;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 8px;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: #e2e8f0;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            background: #cbd5e1;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-family: inherit;
            font-size: 1rem;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #dc2626;
        }

        .modal h2 {
            margin-bottom: 1.5rem;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: #718096;
            margin-bottom: 1.5rem;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 2rem;
            color: #718096;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top-color: #dc2626;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .filters {
                grid-template-columns: 1fr;
            }

            .posts-grid {
                grid-template-columns: 1fr;
            }

            nav {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="logo">🇬🇭 Ghana Connect</div>
        <div class="user-info">
            <span>Welcome, <strong id="userName">User</strong></span>
        </div>
        <div class="nav-buttons">
            <button class="btn btn-primary" id="postBtn">+ Post Listing</button>
            <button class="btn btn-secondary" id="logoutBtn">Logout</button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <!-- Filters -->
        <div class="filters">
            <div class="filter-group">
                <label for="categoryFilter">Category</label>
                <select id="categoryFilter">
                    <option value="">All Categories</option>
                    <option value="jobs">💼 Jobs</option>
                    <option value="housing">🏠 Housing</option>
                    <option value="services">🔧 Services</option>
                    <option value="farming">🌱 Farming</option>
                    <option value="education">📚 Education</option>
                    <option value="marketplace">🛒 Marketplace</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="regionFilter">Region</label>
                <select id="regionFilter">
                    <option value="">All Regions</option>
                    <option value="Greater Accra">Greater Accra</option>
                    <option value="Ashanti">Ashanti</option>
                    <option value="Volta">Volta</option>
                    <option value="Eastern">Eastern</option>
                    <option value="Central">Central</option>
                    <option value="Western">Western</option>
                    <option value="Northern">Northern</option>
                    <option value="Bono">Bono</option>
                    <option value="Oti">Oti</option>
                    <option value="Upper East">Upper East</option>
                    <option value="Upper West">Upper West</option>
                    <option value="Ahafo">Ahafo</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="searchInput">Search</label>
                <input type="text" id="searchInput" placeholder="Search listings...">
            </div>
        </div>

        <!-- Posts Grid -->
        <div id="postsContainer" class="posts-grid"></div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="empty-state-icon">📭</div>
            <h3>No listings found</h3>
            <p>Try adjusting your filters or create the first listing</p>
            <button class="btn btn-primary" id="emptyPostBtn">Create Listing</button>
        </div>
    </div>

    <!-- Create Post Modal -->
    <div id="postModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closePostModal()">×</button>
            <h2>Create New Listing</h2>

            <form id="postForm">
                <div class="form-group">
                    <label for="postTitle">Title *</label>
                    <input type="text" id="postTitle" required placeholder="What are you listing?">
                </div>

                <div class="form-group">
                    <label for="postCategory">Category *</label>
                    <select id="postCategory" required>
                        <option value="">Select category</option>
                        <option value="jobs">💼 Jobs</option>
                        <option value="housing">🏠 Housing</option>
                        <option value="services">🔧 Services</option>
                        <option value="farming">🌱 Farming</option>
                        <option value="education">📚 Education</option>
                        <option value="marketplace">🛒 Marketplace</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="postRegion">Region *</label>
                    <select id="postRegion" required>
                        <option value="">Select region</option>
                        <option value="Greater Accra">Greater Accra</option>
                        <option value="Ashanti">Ashanti</option>
                        <option value="Volta">Volta</option>
                        <option value="Eastern">Eastern</option>
                        <option value="Central">Central</option>
                        <option value="Western">Western</option>
                        <option value="Northern">Northern</option>
                        <option value="Bono">Bono</option>
                        <option value="Oti">Oti</option>
                        <option value="Upper East">Upper East</option>
                        <option value="Upper West">Upper West</option>
                        <option value="Ahafo">Ahafo</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="postDescription">Description *</label>
                    <textarea id="postDescription" required placeholder="Describe your listing in detail..."></textarea>
                </div>

                <div class="form-group">
                    <label for="postPrice">Price (optional)</label>
                    <input type="number" id="postPrice" placeholder="Enter price (GHS)">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Post Listing</button>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"></script>
    <script src="app.js"></script>

    <script>
        let currentUser = null;
        let allPosts = [];

        // Check authentication
        firebase.auth().onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            currentUser = user;
            document.getElementById('userName').textContent = user.displayName || user.email.split('@')[0];
            loadPosts();
        });

        // Load posts
        async function loadPosts() {
            const container = document.getElementById('postsContainer');
            container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

            const category = document.getElementById('categoryFilter').value;
            const region = document.getElementById('regionFilter').value;
            const search = document.getElementById('searchInput').value;

            let posts = await window.GhanaConnect.getPosts(category || null, region || null, 50);

            if (search) {
                posts = posts.filter(p =>
                    p.title.toLowerCase().includes(search.toLowerCase()) ||
                    p.description.toLowerCase().includes(search.toLowerCase())
                );
            }

            allPosts = posts;
            renderPosts(posts);
        }

        // Render posts
        function renderPosts(posts) {
            const container = document.getElementById('postsContainer');
            const empty = document.getElementById('emptyState');

            if (posts.length === 0) {
                container.style.display = 'none';
                empty.style.display = 'block';
                return;
            }

            container.style.display = 'grid';
            empty.style.display = 'none';

            container.innerHTML = posts.map(post => {
                const categoryMap = {
                    'jobs': '💼',
                    'housing': '🏠',
                    'services': '🔧',
                    'farming': '🌱',
                    'education': '📚',
                    'marketplace': '🛒'
                };

                return `
                    <div class="post-card" onclick="viewPost('${post.id}')">
                        <div class="post-image">${categoryMap[post.category] || '📌'}</div>
                        <div class="post-content">
                            <span class="post-category">${post.category.toUpperCase()}</span>
                            <div class="post-title">${post.title}</div>
                            <div class="post-description">${post.description}</div>
                            <div class="post-footer">
                                ${post.price ? `<div class="post-price">₵${post.price}</div>` : '<div></div>'}
                                <span class="post-region">${post.region}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Event listeners
        document.getElementById('categoryFilter').addEventListener('change', loadPosts);
        document.getElementById('regionFilter').addEventListener('change', loadPosts);
        document.getElementById('searchInput').addEventListener('input', loadPosts);

        document.getElementById('postBtn').addEventListener('click', () => {
            document.getElementById('postModal').classList.add('show');
        });

        document.getElementById('emptyPostBtn').addEventListener('click', () => {
            document.getElementById('postModal').classList.add('show');
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            window.GhanaConnect.logoutUser();
        });

        // Create post
        document.getElementById('postForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = document.getElementById('postTitle').value;
            const category = document.getElementById('postCategory').value;
            const region = document.getElementById('postRegion').value;
            const description = document.getElementById('postDescription').value;
            const price = document.getElementById('postPrice').value;

            const btn = e.target.querySelector('button');
            btn.textContent = 'Posting...';
            btn.disabled = true;

            const result = await window.GhanaConnect.createPost(title, description, category, region, price || null);

            if (result.success) {
                closePostModal();
                loadPosts();
                alert('Listing posted successfully!');
            } else {
                alert('Error posting listing: ' + result.error);
            }

            btn.textContent = 'Post Listing';
            btn.disabled = false;
        });

        function closePostModal() {
            document.getElementById('postModal').classList.remove('show');
            document.getElementById('postForm').reset();
        }

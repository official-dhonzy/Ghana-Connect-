<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ghana Connect Posts</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>🇬🇭 Ghana Connect</h1>

<p>Find trusted opportunities</p>

</header>



<div class="search-box">

<input 
id="search"
placeholder="Search..."
onkeyup="filterPosts()"
>


<select id="category" onchange="filterPosts()">

<option value="">All Categories</option>
<option>Jobs</option>
<option>Services</option>
<option>Housing</option>
<option>Farming</option>
<option>Marketplace</option>

</select>



<select id="region" onchange="filterPosts()">

<option value="">All Regions</option>
<option>Greater Accra</option>
<option>Ashanti</option>
<option>Western</option>
<option>Central</option>
<option>Eastern</option>
<option>Volta</option>
<option>Northern</option>
<option>Upper East</option>
<option>Upper West</option>
<option>Bono</option>
<option>Bono East</option>
<option>Ahafo</option>
<option>Savannah</option>
<option>North East</option>
<option>Oti</option>
<option>Western North</option>

</select>


</div>



<div id="posts"></div>




<script type="module">


import {db, auth} from "./firebase.js";


import {

collection,
getDocs,
addDoc

} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";



let allPosts=[];




async function loadPosts(){


let snapshot =
await getDocs(collection(db,"posts"));


allPosts=[];


snapshot.forEach(doc=>{


allPosts.push({

id:doc.id,

...doc.data()

});


});


displayPosts(allPosts);


}






async function getRating(postId){


let snapshot = await getDocs(

collection(db,"reviews")

);



let total=0;

let count=0;



snapshot.forEach(doc=>{


let review=doc.data();



if(review.postId===postId){


total += review.rating;

count++;


}


});



if(count===0){

return "⭐ No reviews";

}



let average =

(total/count).toFixed(1);



return "⭐ " + average + 
" (" + count + " reviews)";


}







async function displayPosts(posts){


let box=document.getElementById("posts");


box.innerHTML="";



for(let post of posts){



let rating = await getRating(post.id);



box.innerHTML += `


<div class="card">


<h3>

${post.type}

</h3>



<h2>

${post.title}

${post.verified ? " ✅":""}

</h2>



<p>

${post.description}

</p>


<p>

📍 ${post.location}

</p>



<p>

${rating}

</p>



<button onclick="savePost('${post.id}')">

❤️ Save

</button>




<button onclick="startChat('${post.userId}')">

💬 Message Seller

</button>



<a href="review.html?post=${post.id}">

<button>

⭐ Write Review

</button>

</a>



</div>


`;



}



}






window.savePost = async function(postId){


let user=auth.currentUser;


if(!user){

alert("Login first");

return;

}



await addDoc(

collection(db,"favorites"),

{

userId:user.uid,

postId:postId,

date:new Date()

}

);



alert("Saved ❤️");


}







window.startChat=async function(sellerId){


let user=auth.currentUser;


if(!user){

alert("Login first");

return;

}



let chat = await addDoc(

collection(db,"conversations"),

{

users:[user.uid,sellerId],

createdAt:new Date()

}

);



window.location.href=

"message.html?id="+chat.id+
"&receiverId="+sellerId;


}







window.filterPosts=function(){


let text =
document.getElementById("search").value.toLowerCase();



let category =
document.getElementById("category").value;



let region =
document.getElementById("region").value;



let result =
allPosts.filter(post=>{


return (

(post.title||"")
.toLowerCase()
.includes(text)

&&

(category==="" || post.type===category)

&&

(region==="" || post.location===region)

);


});


displayPosts(result);


}






loadPosts();


</script>


</body>

</html>

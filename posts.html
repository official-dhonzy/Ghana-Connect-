<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ghana Connect</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>🇬🇭 Ghana Connect</h1>

<p>Find trusted opportunities</p>

</header>



<div class="search-box">


<input 
id="search" 
placeholder="Search jobs, services, products..."
onkeyup="filterPosts()"
>


<select id="category" onchange="filterPosts()">

<option value="">All Categories</option>

<option>Jobs</option>

<option>Services</option>

<option>Housing</option>

<option>Farming</option>

<option>Marketplace</option>

</select>



<select id="region" onchange="filterPosts()">

<option value="">All Regions</option>

<option>Greater Accra</option>
<option>Ashanti</option>
<option>Western</option>
<option>Central</option>
<option>Eastern</option>
<option>Volta</option>
<option>Northern</option>
<option>Upper East</option>
<option>Upper West</option>
<option>Bono</option>
<option>Bono East</option>
<option>Ahafo</option>
<option>Savannah</option>
<option>North East</option>
<option>Oti</option>
<option>Western North</option>

</select>


</div>




<div id="posts"></div>




<script type="module">


import {db} from "./firebase.js";


import {

collection,

getDocs

} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";



let allPosts = [];



async function loadPosts(){


let snapshot =
await getDocs(collection(db,"posts"));



allPosts=[];



snapshot.forEach((doc)=>{


allPosts.push({

id:doc.id,

...doc.data()

});


});



displayPosts(allPosts);


}




function displayPosts(posts){


let box =
document.getElementById("posts");


box.innerHTML="";



posts.forEach(post=>{


box.innerHTML += `


<div class="card">


<h3>

${post.type}

${post.featured ? " ⭐ Featured" : ""}

</h3>



<h2>

${post.title}

${post.verified ? " ✅ Verified" : ""}

</h2>



<p>${post.description}</p>


<p>📍 ${post.location}</p>


<p>📞 ${post.phone}</p>



<a href="tel:${post.phone}">

<button>

📞 Contact

</button>

</a>



<a href="review.html?post=${post.id}">

<button>

⭐ Review

</button>

</a>



</div>


`;



});


}





window.filterPosts=function(){


let text =

document.getElementById("search")
.value
.toLowerCase();



let category =

document.getElementById("category")
.value;



let region =

document.getElementById("region")
.value;



let result = allPosts.filter(post=>{


return (

post.title.toLowerCase().includes(text)

&&

(category==="" || post.type===category)

&&

(region==="" || post.location===region)

);


});



displayPosts(result);


}



loadPosts();


</script>



</body>

</html>

<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ghana Connect</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>🇬🇭 Ghana Connect</h1>

<p>Find trusted opportunities</p>

</header>



<div id="posts"></div>



<script type="module">


import {db} from "./firebase.js";


import {

collection,

getDocs

} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";



let postsBox =
document.getElementById("posts");



async function loadPosts(){


let snapshot =
await getDocs(collection(db,"posts"));



snapshot.forEach((doc)=>{


let post = doc.data();


postsBox.innerHTML += `


<div class="card">


<h3>${post.type}</h3>


<h2>${post.title}</h2>


<p>${post.description}</p>


<p>📍 ${post.location}</p>


<p>📞 ${post.phone}</p>


<a href="tel:${post.phone}">

<button>
Contact
</button>

</a>



<a href="review.html?post=${doc.id}">

<button>
⭐ Review
</button>

</a>


</div>


`;



});



}



loadPosts();



</script>


</body>

</html>

<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ghana Connect</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>🇬🇭 Ghana Connect</h1>

<p>Find opportunities and solutions</p>

</header>



<div class="search-box">

<input id="search" placeholder="Search jobs, services, houses..." onkeyup="searchPosts()">

</div>



<div id="posts"></div>



<script type="module">


import { db } from "./firebase.js";


import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";



let allPosts = [];



async function loadPosts(){


const snapshot =
await getDocs(collection(db,"posts"));



allPosts=[];


snapshot.forEach((doc)=>{

allPosts.push(doc.data());

});



displayPosts(allPosts);


}



function displayPosts(posts){


const container =
document.getElementById("posts");


container.innerHTML="";



posts.forEach(post=>{


container.innerHTML += `

<div class="card">

<h3>${post.type}</h3>

<h2>${post.title}</h2>

<p>${post.description}</p>

<p>📍 ${post.location}</p>

</div>

`;


});


}




window.searchPosts=function(){


let text =
document
.getElementById("search")
.value
.toLowerCase();



let filtered =
allPosts.filter(post=>


post.title.toLowerCase().includes(text)

||

post.description.toLowerCase().includes(text)

||

post.location.toLowerCase().includes(text)


);



displayPosts(filtered);


}




loadPosts();


</script>


</body>

</html>

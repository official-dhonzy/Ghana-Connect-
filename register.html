<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign Up - Ghana Connect</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#1a202c,#2d3748);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    background:white;
    width:100%;
    max-width:420px;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.logo{
    text-align:center;
    font-size:28px;
    font-weight:bold;
    color:#dc2626;
    margin-bottom:10px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    background:#dc2626;
    color:white;
    border:none;
    border-radius:8px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#991b1b;
}

.message{
    text-align:center;
    margin:15px 0;
    color:red;
}

.success{
    color:green;
}

a{
    display:block;
    text-align:center;
    margin-top:20px;
    color:#dc2626;
    text-decoration:none;
}
</style>

</head>

<body>


<div class="container">

<div class="logo">
🇬🇭 Ghana Connect
</div>


<h2>Create Account</h2>


<input 
id="username"
placeholder="Username"
>


<input 
id="email"
type="email"
placeholder="Email address"
>


<input 
id="password"
type="password"
placeholder="Password"
>


<input 
id="confirmPassword"
type="password"
placeholder="Confirm password"
>


<div id="message" class="message"></div>


<button onclick="register()">
Create Account
</button>


<a href="login.html">
Already have an account? Login
</a>


</div>


<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";


import { 
getAuth,
createUserWithEmailAndPassword
} 
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";


import {
getFirestore,
doc,
setDoc
}
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";


const firebaseConfig = {

apiKey:"AIzaSyC2GgAJMbXUvGIF84EeVTvolJnvIaZagQ0",

authDomain:"ghana-connect-fc3e2.firebaseapp.com",

projectId:"ghana-connect-fc3e2",

storageBucket:"ghana-connect-fc3e2.firebasestorage.app",

messagingSenderId:"835108806293",

appId:"1:835108806293:web:7f5ee41e10b4272af4c59c"

};


const app = initializeApp(firebaseConfig);


const auth = getAuth(app);

const db = getFirestore(app);



window.register = async function(){


let username =
document.getElementById("username").value.trim();


let email =
document.getElementById("email").value.trim();


let password =
document.getElementById("password").value;


let confirm =
document.getElementById("confirmPassword").value;



let message =
document.getElementById("message");



if(!username || !email || !password){

message.innerHTML="Please fill all fields";

return;

}



if(password !== confirm){

message.innerHTML="Passwords do not match";

return;

}



try{


const userCredential =
await createUserWithEmailAndPassword(
auth,
email,
password
);


const user =
userCredential.user;



await setDoc(
doc(db,"users",user.uid),
{

username:username,

email:email,

createdAt:new Date()

}

);



message.className="message success";

message.innerHTML=
"Account created successfully ✅";



setTimeout(()=>{

window.location.href="posts.html";

},2000);



}

catch(error){

message.innerHTML=error.message;

}



}


</script>


</body>
</html>

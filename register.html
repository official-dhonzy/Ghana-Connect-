<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Ghana Connect</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            color: #dc2626;
            margin-bottom: 0.5rem;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #718096;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #dc2626;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
        }

        .error {
            color: #dc2626;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
        }

        .error.show {
            display: block;
        }

        .btn-submit {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(220, 38, 38, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit.loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #718096;
        }

        .footer a {
            color: #dc2626;
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .success-message {
            background: #dcfce7;
            color: #166534;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: none;
            border-left: 4px solid #16a34a;
        }

        .success-message.show {
            display: block;
        }

        .password-requirements {
            font-size: 0.8rem;
            color: #718096;
            margin-top: 0.5rem;
            line-height: 1.6;
        }

        .requirement {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .requirement.met {
            color: #16a34a;
        }

        .check {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #cbd5e1;
            border-radius: 50%;
            text-align: center;
            line-height: 12px;
        }

        .requirement.met .check {
            background: #16a34a;
            border-color: #16a34a;
            color: white;
            font-size: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🇬🇭 Ghana Connect</div>
            <div class="title">Create Account</div>
            <div class="subtitle">Join thousands connecting in Ghana</div>
        </div>

        <div class="success-message" id="successMessage">
            Account created! Redirecting to dashboard...
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Choose your username">
                <div class="error" id="usernameError"></div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="your@email.com">
                <div class="error" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="At least 8 characters">
                <div class="password-requirements">
                    <div class="requirement" id="req-length">
                        <span class="check"></span> At least 8 characters
                    </div>
                    <div class="requirement" id="req-upper">
                        <span class="check"></span> One uppercase letter
                    </div>
                    <div class="requirement" id="req-number">
                        <span class="check"></span> One number
                    </div>
                </div>
                <div class="error" id="passwordError"></div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Repeat your password">
                <div class="error" id="confirmError"></div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">Create Account</button>
        </form>

        <div class="footer">
            Already have an account? <a href="login.html">Sign In</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"></script>
    <script src="app.js"></script>

    <script>
        const form = document.getElementById('registerForm');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submitBtn');

        // Password validation
        passwordInput.addEventListener('input', (e) => {
            const password = e.target.value;
            
            const reqLength = document.getElementById('req-length');
            const reqUpper = document.getElementById('req-upper');
            const reqNumber = document.getElementById('req-number');

            password.length >= 8 ? reqLength.classList.add('met') : reqLength.classList.remove('met');
            /[A-Z]/.test(password) ? reqUpper.classList.add('met') : reqUpper.classList.remove('met');
            /[0-9]/.test(password) ? reqNumber.classList.add('met') : reqNumber.classList.remove('met');
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Clear previous errors
            document.querySelectorAll('.error').forEach(el => el.classList.remove('show'));

            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validation
            if (!username || username.length < 3) {
                showError('usernameError', 'Username must be at least 3 characters');
                return;
            }

            if (!email) {
                showError('emailError', 'Please enter a valid email');
                return;
            }

            if (password.length < 8) {
                showError('passwordError', 'Password must be at least 8 characters');
                return;
            }

            if (!/[A-Z]/.test(password)) {
                showError('passwordError', 'Password must contain at least one uppercase letter');
                return;
            }

            if (!/[0-9]/.test(password)) {
                showError('passwordError', 'Password must contain at least one number');
                return;
            }

            if (password !== confirmPassword) {
                showError('confirmError', 'Passwords do not match');
                return;
            }

            // Disable button
            submitBtn.classList.add('loading');
            submitBtn.textContent = 'Creating account...';

            // Register user
            const result = await window.GhanaConnect.registerUser(email, password, username);

            if (result.success) {
                document.getElementById('successMessage').classList.add('show');
                setTimeout(() => {
                    window.location.href = 'posts.html';
                }, 2000);
            } else {
                submitBtn.classList.remove('loading');
                submitBtn.textContent = 'Create Account';
                
                if (result.error.includes('already in use')) {
                    showError('emailError', 'This email is already registered');
                } else {
                    showError('emailError', result.error);
                }
            }
        });

        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.classList.add('show');
        }
    </script>
</body>
</html>
